<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link rel="stylesheet" type="text/css" href="style.css">
  <title>Artmart – Framing</title>
</head>
<body>
<header>
  <a href="search.html">
    <img src="artmart_logo.png" alt="Artmart" class="logo">
  </a>
  <nav>
    <a href="search.html">Search</a>
  </nav>
</header>

<main class="framing-main" style="justify-content: center;">
  <!-- Только превью -->
  <div id="preview-container" class="framing-preview" style="margin: 2rem auto;">
    <img id="preview-image" src="" alt="">
    <div id="image-label" class="museum-label"></div>
  </div>
</main>

<script type="module">
  import * as Frame from './frame.js';
  import { getMetObject } from './met-api.js';

  const urlParams = new URLSearchParams(location.search);
  const objectID = urlParams.get('objectID');
  if (!objectID) {
    location.href = 'search.html';
    throw new Error('Redirect: missing objectID');
  }

  let currentObject;
  try {
    currentObject = await getMetObject(objectID);
    if (!currentObject.primaryImageSmall) throw new Error();
  } catch (e) {
    location.href = 'search.html';
    throw new Error('Redirect: object not found');
  }

  // Заполняем подпись
  const label = document.getElementById('image-label');
  label.innerHTML = `
    <span class="artist">${currentObject.artistDisplayName || ''}</span>
    <span class="title">${currentObject.title}</span>,
    <span class="date">${currentObject.objectDate || ''}</span>
  `;

  const previewImg = document.getElementById('preview-image');
  previewImg.src = currentObject.primaryImageSmall;
  previewImg.alt = currentObject.title;

  const printSize = 'M';
  const frameStyle = 'classic';
  const frameWidth = 2;
  const matColor = 'peach';
  const matWidth = 3;

  // Функция отрисовки (вызывается один раз после загрузки)
  function render() {
    const container = document.getElementById('preview-container');
    Frame.render(previewImg, container, label, printSize, frameStyle, frameWidth, matColor, matWidth);
  }

  // Ожидаем загрузку изображения
  previewImg.onload = () => render();
  if (previewImg.complete) render();

  // Перерисовка при изменении размера окна (опционально)
  window.addEventListener('resize', render);
</script>
</body>
</html>
